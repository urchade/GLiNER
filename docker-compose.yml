version: "3.8"

services:
  gliner-serve:
    build:
      context: ../..
      dockerfile: gliner/serve/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - GLINER_MODEL=urchade/gliner_small-v2.1
      - GLINER_DEVICE=cuda
      - GLINER_DTYPE=bfloat16
      - GLINER_MAX_BATCH_SIZE=32
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/-/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s